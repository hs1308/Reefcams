<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReefCams Player</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #player {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    #error {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #111;
      padding: 24px;
      text-align: center;
    }

    #error-inner {
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      line-height: 1.5;
    }

    #error h1 {
      font-size: 20px;
      font-weight: 700;
    }

    #error p {
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <iframe
      id="player"
      title="ReefCams Player"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </div>

  <div id="error">
    <div id="error-inner">
      <h1>Unable to load this camera</h1>
      <p id="error-text"></p>
    </div>
  </div>

  <script src="/hosted-player/player.js"></script>
</body>
</html>
